<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — {{ site.title }}.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background-color: #0a0a0a;
      color: #c4bfba;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1.25rem 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #86868b;
      border-bottom: 1px solid #1c1a18;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background-color: rgba(10, 10, 10, 0.85);
    }

    nav a {
      transition: color 0.25s ease;
    }

    nav a:hover,
    nav a.active {
      color: #f5f5f7;
    }

    footer {
      position: fixed;
      bottom: 2.5rem;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: #c4bfba;
    }

    footer a {
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #f5f5f7;
    }

    /* Case detail */
    article {
      max-width: 640px;
      margin: 0 auto;
      padding: 8rem 2rem 8rem;
    }

    .case-meta {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #86868b;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      color: #f5f5f7;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 2rem;
    }

    .case-body {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.75;
      color: #c4bfba;
    }

    .case-body p + p {
      margin-top: 1.2em;
    }

    .tags {
      margin-top: 3rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid #2a2826;
      padding: 0.3em 0.8em;
      color: #86868b;
      border-radius: 2px;
    }

    .back {
      display: inline-block;
      margin-bottom: 3rem;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #86868b;
      transition: color 0.3s ease;
    }

    .back:hover {
      color: #f5f5f7;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">Home</a>
    <a href="/opdrachten/" class="active">Opdrachten</a>
  </nav>

  <article>
    <a href="/opdrachten/" class="back">← Opdrachten</a>
    <div class="case-meta">{{ page.period }} &mdash; {{ page.client }}</div>
    <h1>{{ page.title }}</h1>
    <div class="case-body">
      {{ content }}
    </div>
    {% if page.tags %}
    <div class="tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </article>

  {% include footer.html %}

</body>
</html>
